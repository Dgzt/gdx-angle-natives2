name: windows-x64

on:
  workflow_call:
    inputs:
      angleVersion:
        required: true
        type: string

jobs:
  build-windows-x64:
    runs-on: windows-2022
    steps:
      - name: Pack
        shell: bash
        run: |
          wget https://github.com/Dgzt/angle-vulkan-natives/releases/download/v7871/angle-windows-x64.zip
          unzip angle-windows-x64.zip
          ls -la
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: angle-windows-x64
          path: angle-windows-x64
