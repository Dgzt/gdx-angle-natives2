name: Build

on:
  workflow_dispatch:
    inputs:
      angleVersion:
        description: "Angle version"
        required: true
        type: string
jobs:
  build-linux-x64:
    uses: ./.github/workflows/linux-x64.yml
    with:
      angleVersion: ${{ inputs.angleVersion }}
    secrets: inherit

  build-windows-x64:
    uses: ./.github/workflows/windows-x64.yml
    with:
      angleVersion: ${{ inputs.angleVersion }}
    secrets: inherit

  pack:
    runs-on: ubuntu-latest
    needs: [build-linux-x64, build-windows-x64]
    steps:
      - name: Download linux-x64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: angle-linux-x64
          path: download-directory/

      - name: Download windows-x64 Artifact
        uses: actions/download-artifact@v7
        with:
          name: angle-windows-x64
          path: download-directory/

      - name: List directory
        run: |
          ls download-directory/
