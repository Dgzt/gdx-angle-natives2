name: linux-x64

on:
  workflow_call:
    inputs:
      angleVersion:
        required: true
        type: string

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Generate files
        run: |
          sleep 60
          mkdir /tmp/output/
          echo "Hello Linux ${{ inputs.angleVersion }}" >> /tmp/output/linux-x64.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: angle-linux-x64
          path: /tmp/output/

