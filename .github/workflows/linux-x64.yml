name: linux-x64

on:
  workflow_call:
    inputs:
      angleVersion:
        required: true
        type: string

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Generate files
        run: |
          wget https://github.com/Dgzt/angle-vulkan-natives/releases/download/v7871/angle-linux-x64.zip
          unzip angle-linux-x64.zip
          ls -la
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: angle-linux-x64
          path: /tmp/output/

